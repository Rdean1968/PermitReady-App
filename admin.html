<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — PermitReady</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#1e3a2f;--moss:#4a7c59;--sage:#8ab39a;--cream:#f5f0e8;--sand:#e8dfc8;--warm:#faf8f4;--txt:#1a2820;--txtm:#3d5a47;--txtl:#6b8f78;--accent:#c8863a;--acl:#e8a85a;--border:#e8dfc8;--red:#dc2626;--green:#16a34a;--blue:#2563eb}
body{font-family:'DM Sans',sans-serif;background:var(--warm);color:var(--txt);min-height:100vh}

/* NAV */
nav{background:var(--forest);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--cream);text-decoration:none}
.nav-logo span{color:var(--acl)}
.nav-badge{background:var(--accent);color:#fff;font-size:11px;padding:4px 10px;border-radius:4px;margin-left:12px}
.nav-links{display:flex;gap:12px}
.nav-link{font-size:13px;color:var(--sage);text-decoration:none;padding:6px 12px;border-radius:4px;transition:all .2s}
.nav-link:hover{background:rgba(255,255,255,0.1);color:var(--cream)}

/* LAYOUT */
.container{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:220px;background:#fff;border-right:1px solid var(--border);padding:20px 0;flex-shrink:0}
.main{flex:1;padding:24px;overflow-x:auto}

/* SIDEBAR */
.sidebar-section{padding:0 16px;margin-bottom:24px}
.sidebar-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--txtl);margin-bottom:12px}
.sidebar-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;border:none;background:none;font-size:14px;color:var(--txtm);cursor:pointer;border-radius:6px;transition:all .2s;text-align:left}
.sidebar-btn:hover{background:var(--cream)}
.sidebar-btn.active{background:var(--forest);color:#fff}
.sidebar-btn .icon{font-size:16px}
.sidebar-count{margin-left:auto;background:var(--sand);color:var(--txtm);font-size:11px;padding:2px 8px;border-radius:10px}
.sidebar-btn.active .sidebar-count{background:rgba(255,255,255,0.2);color:#fff}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--forest)}
.stat-lbl{font-size:12px;color:var(--txtl);margin-top:4px}
.stat-card.accent{background:var(--forest);border-color:var(--forest)}
.stat-card.accent .stat-val{color:var(--acl)}
.stat-card.accent .stat-lbl{color:var(--sage)}

/* TABLE */
.table-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-title{font-size:16px;font-weight:600;color:var(--forest)}
.table-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--forest);color:#fff}
.btn-primary:hover{background:var(--moss)}
.btn-secondary{background:var(--sand);color:var(--txtm)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}

table{width:100%;border-collapse:collapse}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{background:var(--warm);color:var(--txtl);font-weight:500;text-transform:uppercase;font-size:11px;letter-spacing:0.5px}
tr:hover{background:var(--cream)}
tr:last-child td{border-bottom:none}

.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-new{background:#dbeafe;color:#1e40af}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-approved{background:#d1fae5;color:#065f46}
.badge-claimed{background:#ede9fe;color:#5b21b6}
.badge-available{background:#d1fae5;color:#065f46}

.actions-cell{display:flex;gap:6px}
.action-btn{width:28px;height:28px;border:none;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.action-btn.view{background:#dbeafe;color:#1e40af}
.action-btn.edit{background:#fef3c7;color:#92400e}
.action-btn.delete{background:#fee2e2;color:#dc2626}
.action-btn:hover{opacity:0.8}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:600px;max-height:90vh;overflow:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:600;color:var(--forest)}
.modal-close{width:32px;height:32px;border:none;background:var(--sand);border-radius:6px;cursor:pointer;font-size:18px}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--txtm);margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--moss)}
.form-textarea{min-height:100px;resize:vertical}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--txtl)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-size:14px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--txtl)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--sand);border-top-color:var(--forest);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--forest);color:#fff;padding:14px 20px;border-radius:8px;font-size:14px;display:none;z-index:300}
.toast.show{display:block}
.toast.error{background:var(--red)}
.toast.success{background:var(--green)}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center">
    <a class="nav-logo" href="index.html">Permit<span>Ready</span></a>
    <span class="nav-badge">Admin</span>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">← Back to Site</a>
  </div>
</nav>

<div class="container">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Overview</div>
      <button class="sidebar-btn active" onclick="showSection('dashboard')">
        <span class="icon">📊</span> Dashboard
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Manage</div>
      <button class="sidebar-btn" onclick="showSection('homeowners')">
        <span class="icon">🏠</span> Homeowners
        <span class="sidebar-count" id="count-homeowners">0</span>
      </button>
      <button class="sidebar-btn" onclick="showSection('pros')">
        <span class="icon">🔨</span> Professionals
        <span class="sidebar-count" id="count-pros">0</span>
      </button>
      <button class="sidebar-btn" onclick="showSection('projects')">
        <span class="icon">📋</span> Projects
        <span class="sidebar-count" id="count-projects">0</span>
      </button>
      <button class="sidebar-btn" onclick="showSection('messages')">
        <span class="icon">💬</span> Activity Log
        <span class="sidebar-count" id="count-messages">0</span>
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Tools</div>
      <button class="sidebar-btn" onclick="refreshData()">
        <span class="icon">🔄</span> Refresh Data
      </button>
      <button class="sidebar-btn" onclick="exportData()">
        <span class="icon">📥</span> Export CSV
      </button>
    </div>
  </aside>

  <main class="main">
    <!-- DASHBOARD SECTION -->
    <section id="section-dashboard">
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--forest);margin-bottom:20px">Dashboard</h1>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val" id="stat-homeowners">-</div>
          <div class="stat-lbl">Homeowners</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-pros">-</div>
          <div class="stat-lbl">Professionals</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-projects">-</div>
          <div class="stat-lbl">Projects</div>
        </div>
        <div class="stat-card accent">
          <div class="stat-val" id="stat-claimed">-</div>
          <div class="stat-lbl">Claimed Projects</div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Recent Activity</div>
        </div>
        <div id="recent-activity">
          <div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>
        </div>
      </div>
    </section>

    <!-- HOMEOWNERS SECTION -->
    <section id="section-homeowners" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--forest)">Homeowners</h1>
        <button class="btn btn-primary" onclick="openAddHomeownerModal()">+ Add Homeowner</button>
      </div>
      <div class="table-card">
        <div id="homeowners-table">
          <div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>
        </div>
      </div>
    </section>

    <!-- PROS SECTION -->
    <section id="section-pros" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--forest)">Professionals</h1>
        <button class="btn btn-primary" onclick="openAddProModal()">+ Add Professional</button>
      </div>
      <div class="table-card">
        <div id="pros-table">
          <div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>
        </div>
      </div>
    </section>

    <!-- PROJECTS SECTION -->
    <section id="section-projects" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--forest)">Projects</h1>
      </div>
      <div class="table-card">
        <div id="projects-table">
          <div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>
        </div>
      </div>
    </section>

    <!-- MESSAGES SECTION -->
    <section id="section-messages" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--forest)">Activity Log</h1>
      </div>
      <div class="table-card">
        <div id="messages-table">
          <div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>
        </div>
      </div>
    </section>
  </main>
</div>

<!-- HOMEOWNER MODAL -->
<div class="modal-overlay" id="homeowner-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="homeowner-modal-title">Add Homeowner</div>
      <button class="modal-close" onclick="closeModal('homeowner-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="homeowner-id">
      <div class="form-group">
        <label class="form-label">Name *</label>
        <input type="text" class="form-input" id="homeowner-name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" class="form-input" id="homeowner-email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-input" id="homeowner-phone">
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Street</label>
          <input type="text" class="form-input" id="homeowner-street">
        </div>
        <div class="form-group">
          <label class="form-label">City</label>
          <input type="text" class="form-input" id="homeowner-city">
        </div>
        <div class="form-group">
          <label class="form-label">ZIP</label>
          <input type="text" class="form-input" id="homeowner-zip">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Project Type</label>
        <select class="form-select" id="homeowner-project-type">
          <option value="">Select...</option>
          <option value="new_home">New Home Construction</option>
          <option value="adu_dadu">ADU / DADU</option>
          <option value="addition">Addition</option>
          <option value="remodel">Remodel</option>
          <option value="kitchen">Kitchen</option>
          <option value="bathroom">Bathroom</option>
          <option value="basement">Basement</option>
          <option value="deck">Deck / Outdoor</option>
          <option value="commercial">Commercial TI</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Budget</label>
        <input type="text" class="form-input" id="homeowner-budget" placeholder="e.g. $50,000 - $75,000">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="homeowner-status">
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="matched">Matched</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="homeowner-notes"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('homeowner-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveHomeowner()">Save</button>
    </div>
  </div>
</div>

<!-- PRO MODAL -->
<div class="modal-overlay" id="pro-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="pro-modal-title">Add Professional</div>
      <button class="modal-close" onclick="closeModal('pro-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pro-id">
      <div class="form-group">
        <label class="form-label">Name *</label>
        <input type="text" class="form-input" id="pro-name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" class="form-input" id="pro-email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-input" id="pro-phone">
      </div>
      <div class="form-group">
        <label class="form-label">Company</label>
        <input type="text" class="form-input" id="pro-company">
      </div>
      <div class="form-group">
        <label class="form-label">License Number</label>
        <input type="text" class="form-input" id="pro-license">
      </div>
      <div class="form-group">
        <label class="form-label">Pro Type</label>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <label><input type="checkbox" id="pro-type-builder" value="builder"> Builder/GC</label>
          <label><input type="checkbox" id="pro-type-architect" value="architect"> Architect</label>
          <label><input type="checkbox" id="pro-type-designer" value="designer"> Designer</label>
          <label><input type="checkbox" id="pro-type-engineer" value="engineer"> Engineer</label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Service Area</label>
        <input type="text" class="form-input" id="pro-service-area" placeholder="e.g. King County, Snohomish County">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="pro-status">
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Credit Balance ($)</label>
        <input type="number" class="form-input" id="pro-credit" value="0" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="pro-notes"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('pro-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePro()">Save</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="view-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="view-modal-title">Details</div>
      <button class="modal-close" onclick="closeModal('view-modal')">&times;</button>
    </div>
    <div class="modal-body" id="view-modal-content">
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// SUPABASE CONFIG
const SUPABASE_URL = 'https://tamrwlkjccnwardykqdq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RWn5kCuN0v8onyW0UYBXfA_7XxOEHnX';

// Initialize Supabase Client
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// Data storage
let homeowners = [];
let pros = [];
let projects = [];
let messages = [];

// Load all data
async function loadData() {
  try {
    const { data: h, error: e1 } = await db.from('homeowners').select('*').order('created_at', { ascending: false });
    if (e1) throw e1;
    homeowners = h || [];
    
    const { data: p, error: e2 } = await db.from('pros').select('*').order('created_at', { ascending: false });
    if (e2) throw e2;
    pros = p || [];
    
    const { data: pr, error: e3 } = await db.from('projects').select('*').order('created_at', { ascending: false });
    if (e3) throw e3;
    projects = pr || [];
    
    const { data: m, error: e4 } = await db.from('messages').select('*').order('created_at', { ascending: false }).limit(50);
    if (e4) throw e4;
    messages = m || [];
    
    updateCounts();
    renderDashboard();
    renderHomeowners();
    renderPros();
    renderProjects();
    renderMessages();
  } catch (error) {
    console.error('Error loading data:', error);
    showToast('Error loading data: ' + error.message, 'error');
  }
}

// Update sidebar counts
function updateCounts() {
  document.getElementById('count-homeowners').textContent = homeowners.length;
  document.getElementById('count-pros').textContent = pros.length;
  document.getElementById('count-projects').textContent = projects.length;
  document.getElementById('count-messages').textContent = messages.length;
  
  document.getElementById('stat-homeowners').textContent = homeowners.length;
  document.getElementById('stat-pros').textContent = pros.length;
  document.getElementById('stat-projects').textContent = projects.length;
  document.getElementById('stat-claimed').textContent = projects.filter(p => p.status === 'claimed').length;
}

// Render dashboard
function renderDashboard() {
  const container = document.getElementById('recent-activity');
  const recent = [...homeowners.slice(0, 5).map(h => ({...h, type: 'homeowner'})), 
                  ...pros.slice(0, 5).map(p => ({...p, type: 'pro'}))]
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
    .slice(0, 10);
  
  if (recent.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No activity yet. Homeowners and pros will appear here when they sign up.</div></div>';
    return;
  }
  
  container.innerHTML = `<table>
    <thead><tr><th>Type</th><th>Name</th><th>Email</th><th>Date</th></tr></thead>
    <tbody>${recent.map(r => `
      <tr>
        <td><span class="badge ${r.type === 'homeowner' ? 'badge-new' : 'badge-approved'}">${r.type === 'homeowner' ? '🏠 Homeowner' : '🔨 Pro'}</span></td>
        <td>${r.name || '-'}</td>
        <td>${r.email || '-'}</td>
        <td>${formatDate(r.created_at)}</td>
      </tr>
    `).join('')}</tbody>
  </table>`;
}

// Render homeowners table
function renderHomeowners() {
  const container = document.getElementById('homeowners-table');
  if (homeowners.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🏠</div><div class="empty-text">No homeowners yet.</div></div>';
    return;
  }
  
  container.innerHTML = `<table>
    <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Project</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
    <tbody>${homeowners.map(h => `
      <tr>
        <td>${h.name || '-'}</td>
        <td>${h.email || '-'}</td>
        <td>${h.phone || '-'}</td>
        <td>${formatProjectType(h.project_type)}</td>
        <td><span class="badge badge-${h.status || 'new'}">${h.status || 'new'}</span></td>
        <td>${formatDate(h.created_at)}</td>

// Section navigation
function showSection(section) {
  document.querySelectorAll('.main > section').forEach(s => s.style.display = 'none');
  document.getElementById(`section-${section}`).style.display = 'block';
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.sidebar-btn').classList.add('active');
}

// Modal helpers
function openModal(id) {
  document.getElementById(id).classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function openAddHomeownerModal() {
  document.getElementById('homeowner-modal-title').textContent = 'Add Homeowner';

  document.getElementById('homeowner-email').value = '';

  document.getElementById('homeowner-street').value = '';
  document.getElementById('homeowner-city').value = '';
  document.getElementById('homeowner-zip').value = '';
  document.getElementById('homeowner-project-type').value = '';
  document.getElementById('homeowner-budget').value = '';

function editHomeowner(id) {

function viewHomeowner(id) {
  const h = homeowners.find(x => x.id === id);
  if (!h) return;
  document.getElementById('view-modal-title').textContent = 'Homeowner Details';
  document.getElementById('view-modal-content').innerHTML = `
    <p><strong>Name:</strong> ${h.name || '-'}</p>

  `;
  openModal('view-modal');
}

async function saveHomeowner() {
  const id = document.getElementById('homeowner-id').value;
  const data = {
    name: document.getElementById('homeowner-name').value,
    email: document.getElementById('homeowner-email').value,
    phone: document.getElementById('homeowner-phone').value,
    street: document.getElementById('homeowner-street').value,
    city: document.getElementById('homeowner-city').value,
    zip: document.getElementById('homeowner-zip').value,
    project_type: document.getElementById('homeowner-project-type').value,
    budget: document.getElementById('homeowner-budget').value,
    status: document.getElementById('homeowner-status').value,
    notes: document.getElementById('homeowner-notes').value
  };
  
  try {
    if (id) {
      const { error } = await db.from('homeowners').update(data).eq('id', id);
      if (error) throw error;
      showToast('Homeowner updated!', 'success');
    } else {
      const { error } = await db.from('homeowners').insert(data);
      if (error) throw error;
      showToast('Homeowner added!', 'success');
    }
    closeModal('homeowner-modal');
    loadData();
  } catch (error) {
    showToast('Error: ' + error.message, 'error');
  }
}

async function deleteHomeowner(id) {
  if (!confirm('Are you sure you want to delete this homeowner?')) return;
  try {
    const { error } = await db.from('homeowners').delete().eq('id', id);
    if (error) throw error;
    showToast('Homeowner deleted!', 'success');
    loadData();
  } catch (error) {
    showToast('Error: ' + error.message, 'error');
  }
}

async function savePro() {
  const id = document.getElementById('pro-id').value;
  const proTypes = [];
  if (document.getElementById('pro-type-builder').checked) proTypes.push('builder');
  if (document.getElementById('pro-type-architect').checked) proTypes.push('architect');
  if (document.getElementById('pro-type-designer').checked) proTypes.push('designer');
  if (document.getElementById('pro-type-engineer').checked) proTypes.push('engineer');
  
  const data = {
    name: document.getElementById('pro-name').value,
    email: document.getElementById('pro-email').value,
    phone: document.getElementById('pro-phone').value,
    company: document.getElementById('pro-company').value,
    license_number: document.getElementById('pro-license').value,
    pro_type: proTypes,
    service_area: document.getElementById('pro-service-area').value,
    status: document.getElementById('pro-status').value,
    credit_balance: parseFloat(document.getElementById('pro-credit').value) || 0,
    notes: document.getElementById('pro-notes').value
  };
  
  try {
    if (id) {
      const { error } = await db.from('pros').update(data).eq('id', id);
      if (error) throw error;
      showToast('Professional updated!', 'success');
    } else {
      const { error } = await db.from('pros').insert(data);
      if (error) throw error;
      showToast('Professional added!', 'success');
    }
    closeModal('pro-modal');
    loadData();
  } catch (error) {
    showToast('Error: ' + error.message, 'error');
  }
}

async function deletePro(id) {
  if (!confirm('Are you sure you want to delete this professional?')) return;
  try {
    const { error } = await db.from('pros').delete().eq('id', id);
    if (error) throw error;
    showToast('Professional deleted!', 'success');
    loadData();
  } catch (error) {
    showToast('Error: ' + error.message, 'error');
  }
}

// Helpers
function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function formatProjectType(type) {
  const types = {
    new_home: 'New Home',
    adu_dadu: 'ADU/DADU',
    addition: 'Addition',
    remodel: 'Remodel',
    kitchen: 'Kitchen',
    bathroom: 'Bathroom',
    basement: 'Basement',
    deck: 'Deck/Outdoor',
    commercial: 'Commercial TI'
  };
  return types[type] || type || '-';
}

function showToast(message, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.className = 'toast', 3000);
}

function refreshData() {
  showToast('Refreshing...');
  loadData();
}

function exportData() {
  const csv = [
    ['Type', 'Name', 'Email', 'Phone', 'Status', 'Created'],
    ...homeowners.map(h => ['Homeowner', h.name, h.email, h.phone, h.status, h.created_at]),
    ...pros.map(p => ['Pro', p.name, p.email, p.phone, p.status, p.created_at])
  ].map(row => row.join(',')).join('\n');
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `permitready-export-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  showToast('Exported!', 'success');
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  loadData();
  
  // Subscribe to realtime updates
  db.channel('public:homeowners')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'homeowners' }, () => {
      loadData();
      showToast('New homeowner!', 'success');
    })
    .subscribe();
  
  db.channel('public:pros')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'pros' }, () => {
      loadData();
      showToast('New professional!', 'success');
    })
    .subscribe();
  
  db.channel('public:projects')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, () => {
      loadData();
    })
    .subscribe();
});
</script>
